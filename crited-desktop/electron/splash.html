<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 400px; height: 280px;
      background: #0a0a0a;
      border-radius: 16px;
      overflow: hidden;
      font-family: -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      -webkit-app-region: drag;
      border: 1px solid #1e1e1e;
    }
    .logo {
      width: 60px; height: 60px;
      background: #e8e8e8;
      border-radius: 15px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 800; color: #0a0a0a;
      margin-bottom: 20px;
      animation: pop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .name {
      font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
      color: #e8e8e8; margin-bottom: 6px;
      animation: fadeUp 0.4s ease 0.15s both;
    }
    .tagline {
      font-size: 12px; color: #555; margin-bottom: 36px;
      animation: fadeUp 0.4s ease 0.25s both;
    }
    .bar-wrap {
      width: 140px; height: 2px;
      background: #1a1a1a; border-radius: 2px; overflow: hidden;
      animation: fadeUp 0.4s ease 0.35s both;
    }
    .bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #a78bfa, #22d3ee);
      border-radius: 2px;
      animation: load 1.6s ease forwards 0.45s;
    }
    @keyframes pop {
      from { transform: scale(0.6); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes load {
      0%   { width: 0%;   }
      50%  { width: 70%;  }
      80%  { width: 88%;  }
      100% { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="logo">C</div>
  <div class="name">Crited</div>
  <div class="tagline">AI Workspace for Product Teams</div>
  <div class="bar-wrap"><div class="bar"></div></div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 400px; height: 280px;
      background: #0a0a0a;
      border-radius: 14px;
      overflow: hidden;
      font-family: -apple-system, 'SF Pro Display', 'Segoe UI', monospace;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      -webkit-app-region: drag;
      border: 1px solid #2a2a2a;
    }
    .logo {
      width: 56px; height: 56px;
      background: #e8e8e8;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 800; color: #0a0a0a;
      margin-bottom: 18px;
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    .name {
      font-size: 22px; font-weight: 700;
      color: #e8e8e8; letter-spacing: -0.5px;
      margin-bottom: 6px;
      animation: fadeUp 0.4s ease 0.15s both;
    }
    .tagline {
      font-size: 12px; color: #555;
      animation: fadeUp 0.4s ease 0.25s both;
      margin-bottom: 32px;
    }
    .loader {
      width: 120px; height: 2px;
      background: #1a1a1a; border-radius: 2px;
      overflow: hidden;
      animation: fadeUp 0.4s ease 0.35s both;
    }
    .loader-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #a78bfa, #22d3ee);
      border-radius: 2px;
      animation: load 1.8s ease forwards 0.4s;
    }
    .version {
      position: absolute; bottom: 14px;
      font-size: 10px; color: #333;
      letter-spacing: 0.5px;
    }
    @keyframes pop {
      from { transform: scale(0.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes load {
      0%   { width: 0%; }
      40%  { width: 60%; }
      70%  { width: 80%; }
      100% { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="logo">C</div>
  <div class="name">Crited</div>
  <div class="tagline">AI Workspace for Product Teams</div>
  <div class="loader"><div class="loader-bar"></div></div>
  <div class="version">Loading...</div>
</body>
</html>
